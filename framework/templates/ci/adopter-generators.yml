# govern generators check — adopter CI template.
#
# Copy this file into your project at .github/workflows/govern-generators.yml
# to enforce that govern's generated artifacts (currently the spec
# `dependencies:` frontmatter, generated by scripts/gen-spec-deps.sh) stay in
# sync on every PR.
#
# This is the safety net for contributors who never installed the local
# pre-commit hook (.githooks/pre-commit, set up by /govern). The hook runs
# the generators on every commit and stages the outputs; this CI check fails
# the PR if the committed tree is out of sync.
#
# When new adopter-relevant generators are added by future govern releases,
# this template gains a step for each. Re-running /govern updates the
# template; you re-copy it manually (CI files are not auto-installed by
# /govern — that would require platform detection beyond govern's scope).

name: govern-generators

on:
  pull_request:
    paths:
      - 'specs/**'
      - 'scripts/gen-*.sh'
      - '.githooks/**'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: govern generators are in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gen-spec-deps
        run: ./scripts/gen-spec-deps.sh

      - name: Fail if any generator produced a diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Spec dependencies are out of sync with body links. Run /govern to install the pre-commit hook, or run scripts/gen-spec-deps.sh locally and re-commit."
            exit 1
          fi
