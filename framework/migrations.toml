# framework/migrations.toml — adopter-cleanup registry.
#
# One [[migrations]] entry per active convention removal. Each entry's
# procedure body lives at `framework/migrations/{id}.md`. The bootstrap
# procedure in `framework/bootstrap/govern.md` iterates this file on every
# `/govern` run and applies entries newer than the adopter's `.govern.toml`
# `[migrations].last_applied` field.
#
# See spec 027 — Bootstrap Migration Registry for the governing pipeline:
#   specs/027-bootstrap-migration-registry/spec.md
#
# Sunsetted entries are removed from this file and appended to
# CHANGELOG.md at the repo root.
#
# Ordering: by `introduced_in` SemVer ascending, lexicographic tie-break
# on `id`. File order in this TOML is not authoritative — the bootstrap
# loop sorts on read.

[[migrations]]
id = "gitignore-marker-rename"
introduced_in = "0.2.0"
sunset_after = "0.10.0"
summary = "Replace # Governance marker in .gitignore with # govern"
target_paths = [".gitignore"]
procedure_file = "framework/migrations/gitignore-marker-rename.md"

[[migrations]]
id = "governance-config-rename"
introduced_in = "0.2.0"
sunset_after = "0.10.0"
summary = "Rename .governance.toml → .govern.toml in the project root"
target_paths = [".governance.toml"]
procedure_file = "framework/migrations/governance-config-rename.md"

[[migrations]]
id = "spec-and-plan-sunset"
introduced_in = "0.5.0"
sunset_after = "0.10.0"
summary = "Rename specs/*/spec-and-plan.md → specs/*/spec.md (lightweight-track sunset)"
target_paths = [
  "specs/*/spec-and-plan.md",
  "framework/templates/spec/spec-and-plan.md",
]
procedure_file = "framework/migrations/spec-and-plan-sunset.md"

[[migrations]]
id = "rule-files-relocate"
introduced_in = "0.6.0"
sunset_after = "0.10.0"
summary = "Relocate rule files from specs/ root to specs/rules/ (subsumes configuration.md rename)"
target_paths = [
  "specs/configuration.md",
  "specs/*-backend.md",
  "specs/*-frontend.md",
  "specs/*-cross.md",
]
procedure_file = "framework/migrations/rule-files-relocate.md"

[[migrations]]
id = "session-file-consolidate"
introduced_in = "0.10.0"
summary = "Consolidate {config_dir}/{project}-session.json (host/project-specific JSON) onto .govern.session.toml (repo root, gitignored, host-agnostic)"
target_paths = [
  "{config_dir}/{project}-session.json",
]
procedure_file = "framework/migrations/session-file-consolidate.md"

[[migrations]]
id = "govern-dir-consolidate"
introduced_in = "0.22.0"
# No sunset_after: high-impact directory reorg kept active indefinitely (like
# session-file-consolidate), so any adopter still on the old root layout is
# converged on their next /govern run. The runtime keeps the legacy-path
# fallback indefinitely to match (spec 042).
summary = "Consolidate .govern.toml/.govern.session.toml and the adopter-facing generators under a .govern/ directory (.govern/config.toml, .govern/session.toml, .govern/scripts/)"
# Adopter-relative paths only (no framework/ prefix): govern's own generators
# relocate to .govern/scripts/ as a source move (dogfooding), which is not a
# registry-tracked removal, so /audit Family 10b does not assert on these.
target_paths = [
  ".govern.toml",
  ".govern.session.toml",
  "scripts/gen-spec-deps.sh",
  "scripts/gen-cross-service-refs.sh",
  "scripts/lib/specs-root.sh",
]
procedure_file = "framework/migrations/govern-dir-consolidate.md"

[[migrations]]
id = "constitution-relocate"
introduced_in = "0.24.0"
# No sunset_after: high-impact layout move kept active indefinitely (like
# govern-dir-consolidate), so any adopter still carrying the root
# constitution.md is converged on their next /govern run. No runtime fallback
# exists to pair with it — no primitive reads the constitution; the shipped
# command bodies are rescaffolded to the new path in the same /govern run
# (spec 044).
summary = "Relocate the shipped constitution from the adopter repo root to .govern/constitution.md, re-pointing the CLAUDE.md import, AGENTS.md/README.md links, and any [pinned] entry"
target_paths = [
  "constitution.md",
]
procedure_file = "framework/migrations/constitution-relocate.md"

[[migrations]]
id = "workflows-sunset"
introduced_in = "0.23.0"
sunset_after = "0.25.0"
summary = "Remove scaffolded workflow commands, the synced workflows/registry.json, and the [workflows] config section (workflows feature removed; spec 043; subsumes the archived skills-to-workflows and workflow-filename-rename migrations)"
# Adopter-relative paths drive the bootstrap loop; framework/ paths
# (when present) drive /audit Family 10's no-stale-target-paths check.
target_paths = [
  "{config_dir}/commands/{project}/workflows/",
  "{config_dir}/commands/{project}/skills/",
  "workflows/registry.json",
  "framework/workflows/",
  "framework/skills/",
]
procedure_file = "framework/migrations/workflows-sunset.md"
