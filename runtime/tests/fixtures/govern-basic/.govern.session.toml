url = "{MOCK_HTTP}/archive.tar.gz"
sha256-url = "{MOCK_HTTP}/archive.tar.gz.sha256"
archive = "downloaded.tar.gz"
dest = "staging"
source-root = "staging"
target-root = "project"
pinned = ["framework/constitution.md"]
path = "project/.gitignore"
block = ".cache/\nstaging/"
marker = "govern"
marker-style = "line-prefix"
directory = "project/framework/commands"
expected = ["specify.md"]
set-at = "2026-05-12T00:00:00Z"

[substitutions]
project = "anvil"
cli-config-dir = ".claude"

[[entries]]
source = "framework/commands/specify.md"
dest = "framework/commands/specify.md"
strategy = "update"

[[entries]]
source = "framework/templates/feature.md"
dest = "framework/templates/feature.md"
strategy = "create"

[[entries]]
source = "AGENTS.md"
dest = "AGENTS.md"
strategy = "skip-if-conflict"

[[entries]]
source = "framework/constitution.md"
dest = "framework/constitution.md"
strategy = "update"

[[entries]]
source = ".claude/commands/govern.md"
dest = ".claude/commands/govern.md"
strategy = "update"
keep-literals = ["project", "cli-config-dir"]
