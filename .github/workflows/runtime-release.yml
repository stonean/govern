name: runtime-release

# Tag-triggered cross-compile + GitHub release upload for the
# deterministic runtime binary. Tag scheme: runtime-v<MAJOR>.<MINOR>.<PATCH>.
# The release notes are sourced from runtime/CHANGELOG.md.

on:
  push:
    tags:
      - 'runtime-v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: runtime
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            ext: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (cross builds)
        if: matrix.cross
        run: |
          pip3 install ziglang
          cargo install --locked cargo-zigbuild

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross-compiled via cargo-zigbuild)
        if: matrix.cross
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Smoke test --version
        if: matrix.os != 'ubuntu-latest' || !matrix.cross
        shell: bash
        run: |
          ./target/${{ matrix.target }}/release/runtime${{ matrix.ext }} --version

      - name: Package (tar.gz, Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf "runtime-${{ matrix.target }}.tar.gz" runtime
          shasum -a 256 "runtime-${{ matrix.target }}.tar.gz" > "runtime-${{ matrix.target }}.tar.gz.sha256"

      - name: Package (zip, Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path "runtime.exe" -DestinationPath "runtime-${{ matrix.target }}.zip"
          Get-FileHash "runtime-${{ matrix.target }}.zip" -Algorithm SHA256 | Select-Object -ExpandProperty Hash > "runtime-${{ matrix.target }}.zip.sha256"

      - name: Upload Unix artifacts to release
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime/target/${{ matrix.target }}/release/runtime-${{ matrix.target }}.tar.gz
            runtime/target/${{ matrix.target }}/release/runtime-${{ matrix.target }}.tar.gz.sha256

      - name: Upload Windows artifacts to release
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime/target/${{ matrix.target }}/release/runtime-${{ matrix.target }}.zip
            runtime/target/${{ matrix.target }}/release/runtime-${{ matrix.target }}.zip.sha256
