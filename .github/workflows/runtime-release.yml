name: runtime-release

# Tag-triggered cross-compile + GitHub release upload for the
# deterministic runtime binary. Tag scheme: gvrn-v<MAJOR>.<MINOR>.<PATCH>.
# The release notes are sourced from runtime/CHANGELOG.md.

on:
  push:
    tags:
      - 'gvrn-v*'

permissions:
  contents: write

jobs:
  # Framework self-audit (spec 026) — runs before the build matrix as a
  # pre-tag gate. v1 ships in "soft launch" mode: continue-on-error: true
  # so the release matrix still fires even when /audit surfaces findings.
  # The v1 audit has known findings (Family 4 placeholder-roundtrip and
  # Family 8 introducing-drift) that require separate follow-on work.
  # Once the framework drift is addressed, remove `continue-on-error` so
  # /audit becomes a hard release gate per spec 026 Q4. Until then,
  # findings are visible in workflow logs but do not abort the release.
  audit:
    name: Framework self-audit (advisory in v1)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run /audit
        run: bash scripts/audit/run-all.sh

  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: runtime
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            ext: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (cross builds)
        if: matrix.cross
        run: |
          pip3 install ziglang
          cargo install --locked cargo-zigbuild

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross-compiled via cargo-zigbuild)
        if: matrix.cross
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Smoke test --version
        if: matrix.os != 'ubuntu-latest' || !matrix.cross
        shell: bash
        run: |
          ./target/${{ matrix.target }}/release/gvrn${{ matrix.ext }} --version

      - name: Package (tar.gz, Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf "gvrn-${{ matrix.target }}.tar.gz" gvrn
          shasum -a 256 "gvrn-${{ matrix.target }}.tar.gz" > "gvrn-${{ matrix.target }}.tar.gz.sha256"

      - name: Package (zip, Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path "gvrn.exe" -DestinationPath "gvrn-${{ matrix.target }}.zip"
          Get-FileHash "gvrn-${{ matrix.target }}.zip" -Algorithm SHA256 | Select-Object -ExpandProperty Hash > "gvrn-${{ matrix.target }}.zip.sha256"

      - name: Upload Unix artifacts to release
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime/target/${{ matrix.target }}/release/gvrn-${{ matrix.target }}.tar.gz
            runtime/target/${{ matrix.target }}/release/gvrn-${{ matrix.target }}.tar.gz.sha256

      - name: Upload Windows artifacts to release
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime/target/${{ matrix.target }}/release/gvrn-${{ matrix.target }}.zip
            runtime/target/${{ matrix.target }}/release/gvrn-${{ matrix.target }}.zip.sha256
