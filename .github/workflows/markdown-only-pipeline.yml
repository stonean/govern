name: markdown-only-pipeline

# Opt-in invariant from constitution §runtime-boundary: prove the
# markdown-only path completes without any runtime binary on PATH.
# Tripwire — fails the moment a slash command silently introduces a
# runtime dependency without a graceful fallback.

on:
  pull_request:
    paths:
      - 'framework/**'
      - 'specs/**'
      - '.claude/commands/**'
      - 'scripts/lint-*.sh'
      - '.github/workflows/markdown-only-pipeline.yml'
      - 'runtime/legacy-prose-commands.txt'
      - 'runtime/src/parser/**'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  markdown-only:
    name: Markdown-only path completes without runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: (a) No runtime binary on PATH
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r raw; do
            line="${raw%%#*}"
            line="${line## }"
            line="${line%% }"
            [ -z "$line" ] && continue
            if command -v "$line" >/dev/null 2>&1; then
              echo "::error::Runtime tool '$line' is on PATH in CI; opt-in invariant violated"
              fail=1
            fi
          done < framework/runtime-tools.txt
          exit $fail

      - name: (b) Bash generator scripts run clean
        run: |
          bash .govern/scripts/gen-spec-deps.sh --dry-run
          bash .govern/scripts/gen-cross-service-refs.sh --dry-run
          bash scripts/gen-help-tables.sh --dry-run

      - name: (c) markdownlint passes
        run: npx markdownlint-cli2

      - name: (d) Tool-coverage lint passes
        run: bash scripts/lint-tool-coverage.sh

      - name: (e) Frontmatter integrity
        run: bash scripts/lint-frontmatter.sh

      - name: (g) Rule filename suffix lint
        run: bash scripts/lint-rule-filenames.sh

      - name: (i) Rule-ID grammar lint
        run: bash scripts/lint-rule-ids.sh

      # Step (f) builds a workflow-private copy of the runtime binary at
      # runtime/target/release/gvrn and invokes it via a *relative
      # path* — never adding it to PATH. The opt-in invariant from step
      # (a) (no runtime binary on PATH) is unchanged: a workflow-local
      # compile for the parseability check does not constitute a
      # runtime install.
      # Pinned — keep in sync with runtime/rust-toolchain.toml.
      # `components` must match the toolchain file: any cargo command run
      # under runtime/ makes rustup honor rust-toolchain.toml, and if the
      # declared components are missing it auto-installs them mid-build —
      # a path that hits rustup's "detected conflict: 'bin/cargo-fmt'" bug.
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runtime/target
          key: ${{ runner.os }}-runtime-parseability-${{ hashFiles('runtime/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-runtime-parseability-
      # Build with --locked here so a stale Cargo.lock fails loudly; the
      # script's own `cargo build --release` then becomes a cache-warm
      # no-op against the same target dir.
      - name: (f) Procedure parseability
        run: |
          (cd runtime && cargo build --release --locked --quiet)
          bash scripts/lint-procedure-parseability.sh

      # Step (h) runs the framework self-audit (spec 026). The v1
      # advisories (Family 4 placeholder-roundtrip, Family 8 introducing-
      # drift, Family 9 primitive-promotion candidates) were resolved in
      # commit 1aca768. Per spec 026 §Q4 and the audit-ci-hard-gate
      # scenario, this step is now a hard PR gate: any finding fails the
      # check. To deliberately allow a finding, use the documented
      # ignore-marker annotations (audit:ignore-placeholders,
      # audit:ignore-promotion, etc.) inside the affected source.
      - name: (h) Framework self-audit
        run: bash scripts/audit/run-all.sh
