name: runtime

# Per-PR build, test, clippy, and fmt for the deterministic runtime
# crate. Triggers only on changes that affect the runtime — pure spec or
# framework edits stay on the markdown-only path's workflow.

on:
  pull_request:
    paths:
      - 'runtime/**'
      - 'framework/commands/*.md'
      - '.github/workflows/runtime.yml'
  push:
    branches:
      - main
    paths:
      - 'runtime/**'
      - 'framework/commands/*.md'
      - '.github/workflows/runtime.yml'

permissions:
  contents: read

jobs:
  # Build + test on every OS the release workflow ships binaries for.
  # fmt + clippy stay Linux-only in the lint job below — their output is
  # platform-independent, so tripling them buys nothing.
  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v7

      # Pinned — keep in sync with runtime/rust-toolchain.toml.
      # `components` must match the toolchain file: any cargo command run
      # under runtime/ makes rustup honor rust-toolchain.toml, and if the
      # declared components are missing it auto-installs them mid-build —
      # a path that hits rustup's "detected conflict: 'bin/cargo-fmt'" bug.
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runtime/target
          key: ${{ runner.os }}-runtime-${{ hashFiles('runtime/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-runtime-

      - name: cargo build --release --locked
        run: cargo build --release --locked

      - name: cargo test --release --locked
        run: cargo test --release --locked

  lint:
    name: fmt + clippy (ubuntu-latest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v7

      # Pinned — keep in sync with runtime/rust-toolchain.toml (see the
      # components note on the build-and-test job above).
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runtime/target
          key: ${{ runner.os }}-runtime-${{ hashFiles('runtime/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-runtime-

      # `cargo fmt` does no dependency resolution, so `--locked` does not
      # apply to it (cargo-fmt rejects the flag).
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --release --all-targets --locked -- -D warnings
        run: cargo clippy --release --all-targets --locked -- -D warnings
