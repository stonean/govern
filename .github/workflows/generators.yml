name: generators

on:
  pull_request:
    paths:
      - 'framework/**'
      - 'specs/**'
      - 'scripts/gen-*.sh'
      - 'scripts/tests/**'
      - 'AGENTS.md'
      - '.githooks/**'
      - '.github/workflows/generators.yml'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Generators are in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run gen-configure-mcp
        run: ./scripts/gen-configure-mcp.sh

      - name: Run gen-claude-commands
        run: ./scripts/gen-claude-commands.sh

      - name: Run gen-help-tables
        run: ./scripts/gen-help-tables.sh

      - name: Run gen-spec-deps
        run: ./.govern/scripts/gen-spec-deps.sh

      - name: Run gen-cross-service-refs
        run: ./.govern/scripts/gen-cross-service-refs.sh

      - name: Fail if any generator produced a diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generator outputs are out of date. Run scripts/install-hooks.sh and re-commit."
            exit 1
          fi

      - name: Run gen-spec-deps tests
        run: ./scripts/tests/test-gen-spec-deps.sh

      - name: Run gen-cross-service-refs tests
        run: ./scripts/tests/test-gen-cross-service-refs.sh
